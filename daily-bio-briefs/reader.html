<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>每日合成与发育生物学简报</title>
  <style>
    body { margin:0; font:17px/1.68 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:#17202a; background:#f7f8fb; }
    main { max-width:900px; margin:0 auto; padding:28px 18px 50px; }
    article { background:#fff; border:1px solid #d8dee8; border-radius:8px; padding:26px; }
    a { color:#1769aa; } h1 { line-height:1.2; } h2 { margin-top:32px; border-top:1px solid #edf0f5; padding-top:20px; } h3 { margin-top:24px; }
    code { background:#f1f4f8; padding:2px 5px; border-radius:4px; } pre { overflow:auto; background:#f1f4f8; padding:12px; border-radius:6px; }
    .top { margin-bottom:18px; } .top a { text-decoration:none; }
    .note { color:#667085; background:#f8fafc; border:1px solid #d8dee8; border-radius:6px; padding:12px; }
    @media (max-width:680px){ article{padding:18px;} body{font-size:16px;} }
  </style>
</head>
<body>
<main>
  <div class="top"><a href="index.html">← 返回检索页</a></div>
  <article id="content">加载中...</article>
</main>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
  const date = new URLSearchParams(location.search).get('date');
  const content = document.getElementById('content');
  function escapeHtml(s){ return (s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function renderFallback(){
    fetch('search.json').then(r => r.json()).then(data => {
      const b = (data.briefs || []).find(x => x.date === date);
      if (!b) throw new Error('not indexed');
      document.title = b.title;
      content.innerHTML = `
        <h1>${escapeHtml(b.title)}</h1>
        <p class="note">该日期的完整 Markdown 尚未回填到 GitHub；下面先显示检索索引中的摘要和优先阅读标题。</p>
        <h2>主题</h2><p>${(b.topics || []).map(escapeHtml).join(' / ')}</p>
        <h2>今日概览摘要</h2><p>${escapeHtml(b.summary)}</p>
        <h2>优先阅读标题</h2><ol>${(b.articles || []).map(a => `<li>${escapeHtml(a)}</li>`).join('')}</ol>`;
    }).catch(() => { content.textContent = '没有找到这一天的简报。'; });
  }
  if (!date || !/^\d{4}-\d{2}-\d{2}$/.test(date)) {
    content.textContent = '缺少有效日期。';
  } else {
    fetch(`briefs/${date}.md`).then(r => {
      if (!r.ok) throw new Error('not found');
      return r.text();
    }).then(md => {
      document.title = `每日合成与发育生物学简报 - ${date}`;
      content.innerHTML = marked.parse(md);
    }).catch(renderFallback);
  }
</script>
</body>
</html>
