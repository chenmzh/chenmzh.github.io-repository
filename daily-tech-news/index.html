<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>每日科技新闻简报</title>
  <style>
    body { margin:0; font:16px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; color:#17202a; background:#f7f8fb; }
    main { max-width:1080px; margin:0 auto; padding:28px 18px 48px; }
    h1 { margin:0 0 14px; font-size:32px; line-height:1.15; }
    .controls { display:grid; grid-template-columns:1fr 170px 180px; gap:12px; margin:20px 0; }
    input, select { font:inherit; padding:10px 12px; border:1px solid #cfd6e2; border-radius:6px; background:#fff; }
    .grid { display:grid; gap:12px; }
    .card { display:block; text-decoration:none; color:inherit; background:#fff; border:1px solid #d8dee8; border-radius:8px; padding:16px; }
    .meta { color:#667085; font-size:14px; margin-bottom:6px; }
    .tags { color:#335c81; font-size:14px; margin-top:8px; }
    @media (max-width:700px) { .controls { grid-template-columns:1fr; } h1 { font-size:26px; } }
  </style>
</head>
<body>
<main>
  <h1>每日科技新闻简报</h1>
  <div class="controls">
    <input id="q" type="search" placeholder="搜索日期、标题、摘要、重点新闻或分类">
    <select id="date"><option value="">全部日期</option></select>
    <select id="tag"><option value="">全部分类</option></select>
  </div>
  <div id="list" class="grid"></div>
</main>
<script>
const q = document.getElementById('q');
const dateSelect = document.getElementById('date');
const tag = document.getElementById('tag');
const list = document.getElementById('list');
let briefs = [];
function esc(s) { return (s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function searchable(b) { return [b.date,b.title,b.summary,(b.items||[]).join(' '),((b.categories||b.tags)||[]).join(' ')].join(' ').toLowerCase(); }
function render() {
  const needle = q.value.trim().toLowerCase();
  const selectedDate = dateSelect.value;
  const selected = tag.value;
  const rows = briefs.filter(b => (!needle || searchable(b).includes(needle)) && (!selectedDate || b.date === selectedDate) && (!selected || ((b.categories||b.tags)||[]).includes(selected)));
  list.innerHTML = rows.map(b => `<a class="card" href="${esc(b.url)}">
    <div class="meta">${esc(b.date)}</div>
    <strong>${esc(b.title)}</strong>
    <p>${esc(b.summary || '')}</p>
    <div class="tags">${((b.categories||b.tags) || []).map(esc).join(' / ')}</div>
  </a>`).join('') || '<p>没有匹配结果。</p>';
}
fetch('search.json').then(r => r.json()).then(data => {
  briefs = data.briefs || [];
  dateSelect.innerHTML += briefs.map(b => `<option value="${esc(b.date)}">${esc(b.date)}</option>`).join('');
  const tags = [...new Set(briefs.flatMap(b => (b.categories||b.tags) || []))].sort();
  tag.innerHTML += tags.map(t => `<option value="${esc(t)}">${esc(t)}</option>`).join('');
  render();
});
q.addEventListener('input', render);
dateSelect.addEventListener('change', render);
tag.addEventListener('change', render);
</script>
</body>
</html>
